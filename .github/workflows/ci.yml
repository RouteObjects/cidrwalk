name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cidrwalk-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-latest
    container: swift:6.3
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Swift Version
        run: swift --version

      - name: Resolve Dependencies
        run: swift package resolve

      - name: Test
        run: ./scripts/test.sh
